<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Hub - No JS</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #2cbcc1;
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
      }
      ul {
        list-style: none;
        background-color: #2c72c1;
        padding: 20px;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
      }
      ul li > a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 5px;
      }
      ul li > a:hover {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }
      .current_file {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }

      /* --- HEADER & ENDLESS RUNNERS --- */
      .header-container {
        text-align: center;
        margin-top: 100px;
        margin-bottom: 50px;
      }
      h1 {
        display: inline-block;
        position: relative;
        color: white;
        padding: 40px 100px;
        font-size: 3rem;
        white-space: nowrap;
      }

      /* --- CSS GRID (No JS) --- */
      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 40px;
        max-width: 1300px;
        margin: 0 auto;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
        text-align: center;
      }
      .card:hover {
        transform: translateY(-10px);
        background: #f0faff;
      }

      .card iframe {
        width: 100%;
        height: 180px;
        border: 2px solid #2c72c1;
        border-radius: 8px;
        pointer-events: none;
      }

      .card h3 {
        color: #2c72c1;
        margin: 15px 0;
      }

      .view-link {
        display: inline-block;
        background: #2cbcc1;
        color: white;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 5px;
        font-weight: bold;
      }

      /* --- PURE CSS MODAL (Using :target) --- */
      .modal-overlay {
        display: none; /* Hidden by default */
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }
      /* When the URL ends in #modal-view, show this */
      .modal-overlay:target {
        display: flex;
      }
      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        height: 85%;
        position: relative;
      }
      .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 40px;
        text-decoration: none;
        color: #333;
      }
      .modal-content iframe {
        width: 100%;
        height: 95%;
        border: none;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a class="current_file" href="#">Home</a></li>
      <li><a href="./pages/activities.html">Activities</a></li>
      <li><a href="form.html">Form</a></li>
    </ul>

    <div class="header-container">
      <h1>Hello, welcome to my site.</h1>
    </div>
  </body>
</html>
