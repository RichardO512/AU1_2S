<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lab Exam</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #2cbcc1;
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
      }
      ul {
        list-style: none;
        background-color: #2c72c1;
        padding: 20px;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
      }
      ul li > a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 5px;
      }
      ul li > a:hover {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }
      .current_file {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }

      .header-container {
        text-align: center;
        margin-top: 100px;
        margin-bottom: 50px;
      }
      h1 {
        display: inline-block;
        position: relative;
        color: white;
        padding: 40px 100px;
        font-size: 3rem;
        white-space: nowrap;
      }

      .project-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 25px;
        padding: 40px;
        max-width: 1300px;
        margin: 0 auto;
      }

      .card {
        background: white;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        transition: transform 0.3s ease;
        text-align: center;
      }
      .card:hover {
        transform: translateY(-10px);
        background: #f0faff;
      }

      .card iframe {
        width: 100%;
        height: 180px;
        border: 2px solid #2c72c1;
        border-radius: 8px;
        pointer-events: none;
      }

      .card h3 {
        color: #2c72c1;
        margin: 15px 0;
      }

      .view-link {
        display: inline-block;
        background: #2cbcc1;
        color: white;
        text-decoration: none;
        padding: 8px 20px;
        border-radius: 5px;
        font-weight: bold;
      }

      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 1000;
        justify-content: center;
        align-items: center;
      }

      .modal-overlay:target {
        display: flex;
      }
      .modal-content {
        background: white;
        padding: 20px;
        border-radius: 12px;
        width: 90%;
        height: 85%;
        position: relative;
      }
      .close-btn {
        position: absolute;
        top: 10px;
        right: 20px;
        font-size: 40px;
        text-decoration: none;
        color: #333;
      }
      .modal-content iframe {
        width: 100%;
        height: 95%;
        border: none;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a href="form.html">Form</a></li>
      <li><a class="current_file" href="#">Lab Exam</a></li>
    </ul>

    <!--  -->
    <!-- prelim Exam -->
    <div class="card">
      <iframe src="./FavWebsite2.html"></iframe>
      <h3>Mid Term Exam: Favorite Website 2</h3>
      <a href="#mact16" class="view-link">Launch</a>
    </div>
    <!--Mid term Exam -->
    <div class="card">
      <iframe src="../Midterm/index.html"></iframe>
      <h3>MidExam : Calendar</h3>
      <a href="#modal-view" class="view-link">Launch</a>
    </div>

    <div class="card">
      <iframe src="form.html"></iframe>
      <h3>Semi Exam : Html and Css Form</h3>
      <a href="#form1" class="view-link">Launch</a>
    </div>
    <!--  -->
    <div id="modal-view" class="modal-overlay">
      <div class="modal-content">
        <a href="#" class="close-btn">&times;</a>
        <iframe src="../Midterm/index.html"></iframe>
      </div>
    </div>
    <div id="mact16" class="modal-overlay">
      <div class="modal-content">
        <a href="#" class="close-btn">&times;</a>
        <iframe src="./FavWebsite2.html"></iframe>
      </div>
    </div>
    <div id="form1" class="modal-overlay">
      <div class="modal-content">
        <a href="#" class="close-btn">&times;</a>
        <iframe src="./form.html"></iframe>
      </div>
    </div>
  </body>
</html>
