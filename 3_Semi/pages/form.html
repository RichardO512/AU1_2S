<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        background-color: #2cbcc1;
        font-family: "Segoe UI", sans-serif;
        overflow-x: hidden;
      }
      ul {
        list-style: none;
        background-color: #2c72c1;
        padding: 20px;
        margin: 0;
        display: flex;
        flex-wrap: wrap;
      }
      ul li > a {
        text-decoration: none;
        color: white;
        font-size: 16px;
        margin: 5px;
      }
      ul li > a:hover {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }
      .current_file {
        background-color: #312cc1;
        padding: 10px;
        border-radius: 10%;
      }

      /* Simple Registration Form Styles */
      .form-wrapper {
        display: flex;
        justify-content: center;
        padding: 50px 20px;
      }

      .registration-form {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        width: 100%;
        max-width: 350px;
      }

      .registration-form h2 {
        color: #2c72c1;
        text-align: center;
        margin-top: 0;
      }

      .registration-form input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box; /* keeps padding from breaking width */
      }

      .register-btn {
        width: 100%;
        background-color: #2c72c1;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }

      .register-btn:hover {
        background-color: #312cc1;
      }

      .login-text {
        text-align: center;
        margin-top: 15px;
        font-size: 14px;
        color: #666;
      }

      .login-text a {
        color: #2c72c1;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <ul>
      <li><a href="../index.html">Home</a></li>
      <li><a href="activities.html">Activities</a></li>
      <li><a class="current_file" href="#">Form</a></li>
      <li><a href="LabExam.html">Lab Exam</a></li>
    </ul>

    <div class="form-wrapper">
      <div class="registration-form">
        <h2>Register</h2>
        <form>
          <input type="text" placeholder="First Name" required />
          <input type="text" placeholder="Last Name" required />
          <select name="gender" id="#">
            <option value="gender" selected>Select Gender</option>
            <option value="gender">Male</option>
            <option value="gender">Female</option>
          </select>
          <input type="tel" placeholder="Contact Number" required />
          <input type="email" placeholder="Email" required />
          <input type="password" placeholder="Password" required />

          <button type="submit" class="register-btn">Register Now</button>

          <div class="login-text">Already have an account? <a href="#">Login</a></div>
        </form>
      </div>
    </div>
  </body>
</html>
