<!DOCTYPE html>
<html>
  <head>
    <title>Text Format Example</title>
  </head>
  <body>
    <p><i>italic tag</i></p>
    <p>Underline <u>Its me</u></p>
    <p><b>bold</b> than strong</p>
    <p><strike>Line through</strike></p>
    <p><mark>Highlight Me!</mark></p>
    <p>ROOT<sup>im a square root</sup></p>
    <p>The magazine price is $20.<sub>99</sub>cents</p>
    <p>The following word uses a <big>big</big></p>
    <p>The following word uses a <small>small tag</small></p>
  </body>
</html>
